# Fotoserver-Koffer – Nginx site configuration
# Template-Pfad: /opt/fotoserver  (wird von setup-nginx.sh durch den echten Pfad ersetzt)
# Einrichten:    sudo deploy/scripts/setup-nginx.sh

server {
    listen 80;
    server_name _;          # Alle Hostnamen – Pi hat keinen festen Domainnamen

    # ── Sicherheits-Header (server-Ebene) ─────────────────────────────────
    # WICHTIG: Nginx vererbt add_header-Direktiven nur dann in einen
    # location-Block, wenn dieser Block selbst kein add_header enthält.
    # Locations mit eigenem add_header müssen alle Header wiederholen.
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-Frame-Options         "DENY"        always;
    add_header Referrer-Policy         "same-origin" always;
    # X-XSS-Protection: In modernen Browsern wirkungslos; explizit 0 setzen,
    # da ältere Implementierungen durch ihn angreifbar sein können.
    add_header X-XSS-Protection        "0"           always;
    # Content-Security-Policy: minimale erlaubte Quellen.
    # blob: in img-src nötig für Vorschauen (Object URLs) im Upload-Formular
    # und Lightbox-Viewer. theme-init.js liegt in /theme-init.js (kein inline-script).
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' blob:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
        always;

    # ── Frontend (Vue 3 SPA, Vite-Build) ──────────────────────────────────
    root  /opt/fotoserver/frontend/dist;
    index index.html;

    # SPA-Routing: alle unbekannten Pfade an index.html übergeben
    # Kein eigenes add_header → erbt Sicherheits-Header von oben
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Langzeit-Cache nur für Vite-gehashte Assets unter /assets/
    # (Vite legt alle gehashten Bundles in dist/assets/ ab)
    # Eigenes add_header → alle Sicherheits-Header müssen wiederholt werden
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|ico|webp|png|jpg|jpeg|svg)$ {
        expires    1y;
        add_header Cache-Control          "public, immutable"  always;
        add_header X-Content-Type-Options "nosniff"            always;
        add_header X-Frame-Options        "DENY"               always;
        add_header Referrer-Policy        "same-origin"        always;
        add_header X-XSS-Protection       "0"                  always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' blob:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
            always;
        access_log off;
    }

    # ── API-Proxy → FastAPI Backend (uvicorn auf 127.0.0.1:8000) ──────────
    # Kein eigenes add_header → erbt Sicherheits-Header von oben
    location /api/ {
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;

        # Host auf loopback pinnen – verhindert Host-Header-Injection durch Clients
        proxy_set_header      Host              "127.0.0.1";
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;

        # Upload-Limit: 11 GiB — Backend validiert das exakte 10-GiB-Limit selbst
        # (MAX_FILE_SIZE_MB in .env / max_file_size_mb in backend/app/config.py).
        # Bei Änderung des Backend-Limits diesen Wert konsistent mitziehen
        # (Backend-Limit + ~10% Spielraum für Multipart-Overhead).
        client_max_body_size  11264M;

        # Timeouts: Uploads im GB-Bereich über einen WLAN-Hotspot können lange
        # dauern (z.B. 10 GB bei 20 Mbit/s ≈ 70 Minuten) — hier großzügig, damit
        # nginx eine langsame, aber laufende Übertragung nicht abbricht.
        proxy_connect_timeout  10s;
        proxy_send_timeout   3600s;
        proxy_read_timeout   3600s;
        client_body_timeout  3600s;

        # Request-Body direkt an FastAPI durchreichen statt vollständig in eine
        # Temp-Datei zu puffern — vermeidet doppelten Disk-I/O bei GB-Uploads.
        # RAM ist davon unabhängig sicher: ohne diese Option puffert nginx
        # große Bodies ohnehin auf die Platte (client_body_temp_path), nie in
        # den Arbeitsspeicher.
        proxy_request_buffering off;

        # Puffer für Datei-Antworten (Thumbnails, Originale via FileResponse)
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ── Kompression ────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/fotoserver-access.log;
    error_log  /var/log/nginx/fotoserver-error.log warn;
}
