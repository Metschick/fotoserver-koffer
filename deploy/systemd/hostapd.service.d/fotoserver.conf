# Drop-in: bindet hostapd in den Fotoserver-Lifecycle ein.
# Nach Installation: sudo systemctl daemon-reload
[Unit]
# hostapd stoppt/startet mit fotoserver.target
PartOf=fotoserver.target
# Starker Bind: wenn fotoserver.target in failed-State geht, wird auch der Hotspot gestoppt.
# Kein After=fotoserver.target hier — würde zirkuläre Abhängigkeit erzeugen
# (fotoserver.target After=hostapd.service).
BindsTo=fotoserver.target
# Statische IP muss gesetzt sein, bevor hostapd den Access Point öffnet.
# Wants= (statt Requires=): falls wlan0-Service nicht installiert ist, startet
# hostapd trotzdem (z.B. bei Ethernet-only-Tests ohne Hotspot-Setup).
Wants=fotoserver-wlan0.service
After=fotoserver-wlan0.service
